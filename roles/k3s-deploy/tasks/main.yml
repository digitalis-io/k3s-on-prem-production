---

- name: Retrieve package facts
  ansible.builtin.package_facts:
    manager: "auto"
  tags: always

- name: Check if /etc/k3s-admission.yaml exists
  ansible.builtin.stat:
    path: /etc/k3s-admission.yaml
  register: admission_file
  tags: always

- name: Set psa_admission_enabled
  ansible.builtin.set_fact:
    psa_admission_enabled: "{{ admission_file.stat.exists }}"
  tags: always

- ansible.builtin.import_tasks:
    file: k3s_binary.yml
  tags: always

- name: Setup control-plane
  block:

    # tasks file for k3s-deploy
    - ansible.builtin.import_tasks:
        file: cluster_bootstrap.yml
      tags: bootstrap

    - ansible.builtin.import_tasks:
        file: cluster_server.yml
      tags: server

  when: "'kube_master' in group_names"

- name: Read node-token from master
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  delegate_to: "{{ groups['kube_master'][0] }}"
  register: node_token
  run_once: true
  tags:
    - server
    - agent

- name: Store Master node-token
  ansible.builtin.set_fact:
    token: "{{ hostvars[groups['kube_master'][0]]['node_token'].content | b64decode | regex_replace('\n', '') }}"
  tags:
    - server
    - agent

- ansible.builtin.import_tasks:
    file: cluster_agent.yml
  tags: agent
  when: "'kube_node' in group_names"

- ansible.builtin.import_tasks:
    file: cluster_hardening.yml
  tags: hardening

- name: Deploy internal components
  block:

    - name: Create custom manifest folder
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/server/custom-manifests
        state: directory
        mode: '0700'
        owner: root
        group: root
      tags: always
      when:
        - "'kube_master' in group_names"

    - ansible.builtin.include_tasks:
        file: kubevip.yml
        apply:
          tags: always
      tags: loadbalancer
      when:
        - kubevip_enabled

    - ansible.builtin.include_tasks:
        file: dashboard.yml
        apply:
          tags: always
      tags: dashboard
      when:
        - dashboard_enabled

    # Kubeless is EOL — kept for backwards compatibility flag but tasks are no-ops
    - ansible.builtin.include_tasks:
        file: kubeless.yml
        apply:
          tags: always
      tags: kubeless
      when:
        - kubeless_enabled

  tags: internal_components
  when:
    - "'kube_master' in group_names"

- ansible.builtin.include_tasks:
    file: falco_security.yml
    apply:
      tags: always
  tags: falco_security
  when:
    - falco_security_enabled

...
