---

# CIS 1.1.1 to 1.1.21
- name: Cluster Hardening - Ensure folder permission are strict
  ansible.builtin.command: |
    find {{ item }} -not -path "*containerd*" -exec chmod -c go= {} \;
  register: chmod_result
  changed_when: "chmod_result.stdout != \"\""
  with_items:
    - /etc/rancher
    - /var/lib/rancher

- name: Cluster Hardening - Deploy PSA admission config on masters
  ansible.builtin.template:
    src: k3s-admission.yaml.j2
    dest: /etc/k3s-admission.yaml
    owner: root
    group: root
    mode: '0600'
  when: "'kube_master' in group_names"

- block:
    - name: Fetch namespace names
      ansible.builtin.shell: |
        set -o pipefail
        {{ kubectl_cmd }} get namespaces -A | tail -n +2 | awk '{print $1}'
      changed_when: false
      register: namespaces

    # PSA: label privileged namespaces so system workloads run without restriction
    - name: Security - Check which privileged namespaces exist
      ansible.builtin.command: "{{ kubectl_cmd }} get namespace {{ item }} --no-headers"
      register: ns_check
      changed_when: false
      failed_when: false
      run_once: true
      loop:
        - kube-system
        - kube-public
        - kube-node-lease
        - falco
        - portainer
        - kubernetes-dashboard

    - name: Security - Label privileged namespaces for PSA
      ansible.builtin.command: |
        {{ kubectl_cmd }} label namespace {{ item.item }}
          pod-security.kubernetes.io/enforce=privileged
          pod-security.kubernetes.io/enforce-version=latest
          pod-security.kubernetes.io/audit=privileged
          pod-security.kubernetes.io/warn=privileged
          --overwrite
      register: kubectl
      changed_when: "'labeled' in kubectl.stdout"
      run_once: true
      loop: "{{ ns_check.results | selectattr('rc', 'equalto', 0) | list }}"
      loop_control:
        label: "{{ item.item }}"

    # CIS - 5.1.5 - 5.1.6
    - name: Security - Ensure that default service accounts are not actively used
      ansible.builtin.command: |
        {{ kubectl_cmd }} patch serviceaccount default -n {{ item }} -p 'automountServiceAccountToken: false'
      register: kubectl
      changed_when: "'no change' not in kubectl.stdout"
      failed_when: "'no change' not in kubectl.stderr and kubectl.rc != 0"
      run_once: true
      with_items: "{{ namespaces.stdout_lines }}"

  when: "'kube_master' in group_names"

...
