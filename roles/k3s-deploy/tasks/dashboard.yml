---

- name: Portainer - Deploy HelmChart manifest
  ansible.builtin.template:
    src: portainer/portainer-helmchart.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/portainer.yaml
    owner: 'root'
    group: 'root'
    mode: '0600'

- name: Portainer - Wait for deployment to be ready
  ansible.builtin.shell: |
    set -o pipefail
    {{ kubectl_cmd }} get pods -n portainer | tail -n +2 | grep -Ev "Completed|Running|Success"
  register: pods
  until: (pods.stdout_lines | length) == 0
  failed_when: false
  changed_when: false
  retries: "{{ pod_ready_retries }}"
  delay: "{{ pod_ready_delay }}"
  run_once: true

...
